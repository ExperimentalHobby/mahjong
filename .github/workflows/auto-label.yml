name: Auto Label

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Apply label from title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const target = context.payload.issue ?? context.payload.pull_request;
            const match = target.title.match(/^([a-z]+)(\(.+\))?:/);
            if (!match) return;

            const typeToLabel = {
              feat: 'enhancement',
              fix: 'bug',
              docs: 'documentation',
              refactor: 'refactor',
              chore: 'chore',
              ci: 'chore',
              test: 'testing',
            };
            const label = typeToLabel[match[1]];
            if (!label) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: target.number,
              labels: [label],
            });
