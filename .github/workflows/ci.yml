name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'LICENSE'
      - 'mahjong.code-workspace'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'LICENSE'
      - 'mahjong.code-workspace'
      - '.gitignore'
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # UTC 月曜 00:00 = JST 月曜 09:00

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test (C# - Core / Tests)
        run: dotnet test Mahjong.Tests/Mahjong.Tests.csproj --configuration Release

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (full solution, WPF追加後はここに含まれる)
        run: dotnet build Mahjong.slnx --configuration Release

      - name: Test (C# - full suite)
        run: dotnet test Mahjong.Tests/Mahjong.Tests.csproj --configuration Release

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: "C#: format check (Core / Tests)"
        run: |
          dotnet format Mahjong.Core/Mahjong.Core.csproj --verify-no-changes
          dotnet format Mahjong.Tests/Mahjong.Tests.csproj --verify-no-changes

      - name: "C#: Analyzer warnings (Core / Tests)"
        run: |
          dotnet build Mahjong.Core/Mahjong.Core.csproj
          dotnet build Mahjong.Tests/Mahjong.Tests.csproj

      - name: Gitleaks
        continue-on-error: true
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . -v
        env:
          GITLEAKS_VERSION: "8.30.1"

  weekly-audit:
    name: Weekly Dependency & Secret Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Mahjong.slnx

      - name: "NuGet: vulnerable package audit"
        run: dotnet list Mahjong.slnx package --vulnerable --include-transitive

      - name: Gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v${{ env.GITLEAKS_VERSION }}/gitleaks_${{ env.GITLEAKS_VERSION }}_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . -v
        env:
          GITLEAKS_VERSION: "8.30.1"
